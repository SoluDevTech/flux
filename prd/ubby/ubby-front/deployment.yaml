apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubby-front
  namespace: ubby
  labels:
    app: ubby-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubby-front
  template:
    metadata:
      labels:
        app: ubby-front
        app.kubernetes.io/part-of: soludev-workload
    spec:
      tolerations:
        - key: "klipperlb-exclude"
          value: "true"
          effect: "NoSchedule"
          operator: "Equal"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: soludev-workload
      containers:
        - name: ubby-front
          image: kaiohz/pickpro:ubby-front-7e5ea1177356a952cb78eaea941a7fd2a1341cdc
          ports:
            - containerPort: 80
          env:
            - name: UBBY_MCP_FACTORY_API_BASE_URL
              value: "https://ubby-back.soludev.tech/api/v1"
            - name: UBBY_MCP_FACTORY_SUPABASE_URL
              value: "https://cxjiiggphuhqgmqvjgcw.supabase.co"
            - name: UBBY_MCP_FACTORY_SUPABASE_PUBLISHABLE_KEY
              value: "sb_publishable_0A7hw0HI6aREf11jS7bk8w_-OCxQB1U"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "96Mi"
              cpu: "100m"
      imagePullSecrets:
        - name: ubby-docker-secret