apiVersion: v1
kind: Service
metadata:
  name: ubby-mcp-api
  namespace: ubby
  labels:
    app: ubby-mcp-api
  annotations:
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: mcp-route
    traefik.ingress.kubernetes.io/service.sticky.cookie.httpOnly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.samesite: "lax"
spec:
  type: ClusterIP
  selector:
    app: ubby-mcp-api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http-3000