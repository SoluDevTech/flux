apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubby-mcp-api
  namespace: ubby
  labels:
    app: ubby-mcp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubby-mcp-api
  template:
    metadata:
      labels:
        app: ubby-mcp-api
        app.kubernetes.io/part-of: soludev-workload
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: soludev-workload
      containers:
        - name: ubby-mcp-api
          image: kaiohz/pickpro:ubby-mcp-api-06dd5db6e8dbb5b03c77ff8e4ea1f08b3a7c8bf8
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ubby-mcp-api-config
            - secretRef:
                name: ubby-mcp-api-secret
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
      imagePullSecrets:
        - name: ubby-docker-secret
