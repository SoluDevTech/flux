apiVersion: apps/v1
kind: Deployment
metadata:
  name: raganything
  namespace: composables
  labels:
    app: raganything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raganything
  template:
    metadata:
      labels:
        app: raganything
        app.kubernetes.io/part-of: soludev-workload
    spec:
      enableServiceLinks: false
      tolerations:
        - key: "klipperlb-exclude"
          value: "true"
          effect: "NoSchedule"
          operator: "Equal"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: soludev-workload
      containers:
        - name: raganything
          image: kaiohz/pickpro:raganything-6ed792070028f4b228c28d1a2ee92e4f4da4ea2b
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: raganything-config
            - secretRef:
                name: raganything-secret
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              cpu: "4000m"
              memory: "4Gi"
      imagePullSecrets:
        - name: pickpro-docker-secret
