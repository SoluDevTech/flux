apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-alpha-config
  namespace: openclaw
data:
  oauth2_proxy.yml: |
    server:
      BindAddress: "0.0.0.0:4180"

    upstreamConfig:
      upstreams:
      - id: openclaw
        path: /
        uri: "http://openclaw.openclaw.svc.cluster.local:18789"
        passHostHeader: true
        proxyWebSockets: true

    providers:
    - id: openclaw-oidc
      provider: oidc
      clientID: ${OAUTH2_PROXY_CLIENT_ID}
      clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
      oidcConfig:
        issuerURL: "https://logto.soludev.tech/oidc"
      loginURL: "https://logto.soludev.tech/oidc/auth"
      redeemURL: "http://logto.soludev.svc.cluster.local:3001/oidc/token"
      profileURL: "http://logto.soludev.svc.cluster.local:3001/oidc/me"
      validateURL: "http://logto.soludev.svc.cluster.local:3001/oidc/jwks"
      scope: "openid email profile"

    injectRequestHeaders:
    - name: Authorization
      values:
      - claimSource:
          claim: id_token
          prefix: "Bearer "

    injectResponseHeaders:
    - name: X-Auth-Request-User
      values:
      - claimSource:
          claim: user
    - name: X-Auth-Request-Email
      values:
      - claimSource:
          claim: email
    - name: Authorization
      values:
      - claimSource:
          claim: id_token
          prefix: "Bearer "
