apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-prospectio-pgvector
  namespace: prospectio
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-prospectio-pgvector
  nfs:
    server: 37.60.225.137
    path: /srv/nfs/prospectio/pgvector
  mountOptions:
    - hard
    - nfsvers=4
    - timeo=600
    - retrans=10
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
