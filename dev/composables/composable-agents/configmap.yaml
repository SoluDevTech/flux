apiVersion: v1
kind: ConfigMap
metadata:
  name: composable-agents-config
  namespace: composables
data:
  # === OpenAI-compatible endpoint (OpenRouter, LiteLLM, etc.) ===
  OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
  # === Agent configuration ===
  AGENTS_DIR: "./agents"
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  ALLOWED_ORIGINS: '["https://composables.soludev.tech"]'
  # === MinIO (object storage) ===
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_BUCKET: "composable-agents"
  MINIO_SECURE: "false"
  # === PostgreSQL (metadata) ===
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "raganything"
  POSTGRES_DATABASE: "raganything"
  # === Tracing ===
  ENABLED: "true"
  PROVIDER: "phoenix" # or "langfuse" or "none"
  PROJECT_NAME: "composables"
  PHOENIX_COLLECTOR_ENDPOINT: "https://pheonix.soludev.tech"