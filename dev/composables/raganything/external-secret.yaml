apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: raganything-external-secret
  namespace: composables
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: raganything-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: composables/raganything