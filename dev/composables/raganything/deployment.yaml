apiVersion: apps/v1
kind: Deployment
metadata:
  name: raganything
  namespace: composables
  labels:
    app: raganything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raganything
  template:
    metadata:
      labels:
        app: raganything
    spec:
      enableServiceLinks: false
      tolerations:
        - key: "klipperlb-exclude"
          value: "true"
          effect: "NoSchedule"
          operator: "Equal"
      containers:
        - name: raganything
          image: kaiohz/pickpro:raganything-01b7e961646169e55e536b82fe2962208bada266
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: raganything-config
            - secretRef:
                name: raganything-secret
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
      imagePullSecrets:
        - name: pickpro-docker-secret
