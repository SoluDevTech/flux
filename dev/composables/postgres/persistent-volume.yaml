apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-composables-postgres
  namespace: composables
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-composables-postgres
  nfs:
    server: 100.64.0.3
    path: /Volumes/NFSStorage/composables/postgres
  mountOptions:
    - nfsvers=3
    - hard
    - timeo=600
    - retrans=2
