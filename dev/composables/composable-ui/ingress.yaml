apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: composable-ui-ingress
  namespace: composables
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/redirect-scheme: https
spec:
  rules:
    - host: composables.soludev.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: composable-ui
                port:
                  number: 80