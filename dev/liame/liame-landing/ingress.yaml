apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liam-landing-ingress
  namespace: liame
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/redirect-scheme: https
spec:
  rules:
    - host: liame.soludev.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: liame-landing
                port:
                  number: 80
