apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-opencode-opencode
  namespace: opencode
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 37.60.225.137
    path: /srv/nfs/opencode
  mountOptions:
    - hard
    - nfsvers=4
    - timeo=300
    - retrans=10
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime