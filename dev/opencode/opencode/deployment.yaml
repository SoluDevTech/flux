apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: opencode
  labels:
    app: opencode
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode
  template:
    metadata:
      labels:
        app: opencode
        app.kubernetes.io/part-of: soludev-workload
    spec:
      tolerations:
        - key: "klipperlb-exclude"
          value: "true"
          effect: "NoSchedule"
          operator: "Equal"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - bignode
                    - colima
                    - jetson-desktop
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: soludev-workload
      containers:
        - name: opencode
          image: ghcr.io/anomalyco/opencode:1.15.10
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo 'https://dl-cdn.alpinelinux.org/alpine/edge/community' >> /etc/apk/repositories
              apk add --no-cache nodejs npm git github-cli sonar-scanner gcompat
              npx -y @upstash/context7-mcp@2.3.0 --help >/dev/null 2>&1 || true
              npx -y chrome-devtools-mcp@latest --help >/dev/null 2>&1 || true
              exec opencode web --hostname 0.0.0.0 --port 4096 --print-logs
          envFrom:
            - configMapRef:
                name: opencode-config
            - secretRef:
                name: opencode-secret
          env:
            - name: OPENCODE_DISABLE_AUTOUPDATE
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /root/.local/share/opencode
            - name: projects
              mountPath: /root/projects
            - name: opencode-auth-volume
              mountPath: /root/.local/share/opencode/auth.json
              subPath: auth.json
            - name: opencode-dotdir
              mountPath: /root/.opencode
              subPath: .opencode
            - name: opencode-config-volume
              mountPath: /root/.opencode/opencode.json
              subPath: opencode.json
          livenessProbe:
            httpGet:
              path: /global/health
              port: 4096
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /global/health
              port: 4096
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "3Gi"
              cpu: "2"
      volumes:
        - name: data
          emptyDir: {}
        - name: projects
          persistentVolumeClaim:
            claimName: opencode-data
        - name: opencode-config-volume
          configMap:
            name: opencode-config
            items:
              - key: opencode.json
                path: opencode.json
        - name: opencode-auth-volume
          secret:
            secretName: opencode-secret
            items:
              - key: auth.json
                path: auth.json
        - name: opencode-dotdir
          persistentVolumeClaim:
            claimName: opencode-data
      restartPolicy: Always