apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
  namespace: pickpro
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS "threads" (
    	"id" UUID NOT NULL UNIQUE,
    	"title" TEXT,
    	"created_at" BIGINT,
    	"user_id" TEXT,
    	PRIMARY KEY("id")
    );




    CREATE TABLE IF NOT EXISTS "messages" (
    	"id" UUID NOT NULL UNIQUE,
    	"message" TEXT,
    	"role" TEXT,
    	"thread_id" UUID,
    	"created_at" BIGINT,
    	PRIMARY KEY("id")
    );




    CREATE TABLE IF NOT EXISTS "users" (
    	"id" TEXT UNIQUE,
    	"created_at" BIGINT,
    	PRIMARY KEY("id")
    );




    CREATE TABLE IF NOT EXISTS "resumes" (
    	"id" SERIAL PRIMARY KEY,
    	"hard_skills" JSONB,
    	"soft_skills" JSONB,
    	"companies" JSONB,
    	"industries" JSONB,
    	"degrees" JSONB,
    	"location" TEXT,
    	"zipcode" INTEGER,
    	"contract_types" JSONB,
    	"expected_salary_min" INTEGER,
    	"expected_salary_max" INTEGER,
    	"expected_daily_rate" INTEGER,
    	"work_mode" JSONB,
    	"years_of_experience" INTEGER,
    	"seniority" TEXT,
    	"updated_at" BIGINT,
    	"is_active" BOOLEAN,
    	"job_label" TEXT,
    	"job_family" TEXT,
    	"job_domain" TEXT,
    	"lastname" TEXT,
    	"firstname" TEXT,
    	"phone" TEXT,
    	"mail" TEXT,
    	"bucket" TEXT,
    	"object_path" TEXT
    );

    CREATE TABLE job_names (
        id SERIAL PRIMARY KEY,
        label VARCHAR(255) NOT NULL,
        family VARCHAR(50) NOT NULL,
        domain VARCHAR(50) NOT NULL
    );

