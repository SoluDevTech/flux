apiVersion: v1
kind: ConfigMap
metadata:
  name: pickpro-indexing-api-config
  namespace: pickpro
data:
  ALLOWED_ORIGINS: '["https://pickpro.soludev.tech"]'
  ALLOWED_TRANSCRIPT_DOMAINS: '["recall.ai"]'
  EMBEDDING_CLIENT: openai/text-embedding-3-large
  ENVIRONMENT: development
  INDEXING_MODEL: google/gemini-2.5-flash-lite:nitro
  MAX_WORKERS: "2"
  MINIO_HOST: minio-pickpro.pickpro.svc.cluster.local:9000
  OPEN_ROUTER_API_URL: https://openrouter.ai/api/v1
  PHOENIX_HOST: https://phoenix.soludev.tech
  PYTHONPATH: ./pickpro_indexing_api
  RECALL_AI_REGION: eu-central-1
  SUMMARY_MODEL: anthropic/claude-haiku-4.5:nitro
  TEMPERATURE: "0.0"
  TRANSCRIPT_BUCKET: transcripts
  # KREUZBERG EXTRACTION
  EXTRACT_PROFILE_PHOTO: "true"
  ENABLE_HIERARCHY_DETECTION: "true"
  INCLUDE_HEADERS: "false"
  INCLUDE_FOOTERS: "false"
  FORCE_OCR: "true"
  OCR_MODE: "vlm"
  VLM_MODEL: google/gemini-2.5-flash-lite:nitro
  VLM_TEMPERATURE: "0.0"
  VLM_TIMEOUT_SECS: "120"
  NATS_USER: "pickpro"
  NATS_URL: "nats://nats.pickpro.svc.cluster.local:4222"
  NATS_STREAM_NAME: "PICKPRO"
  NATS_STREAM_SUBJECT: "mass-import"
  NATS_MAX_PAYLOAD: "15728640"
  NATS_MAX_AGE: "604800"
  NATS_MAX_CONCURRENT: "3"
  NATS_MAX_RECONNECT: "-1"
  NATS_RECONNECT_WAIT: "2"
  NATS_DURABLE_NAME: "mass-import-consumer"
  NATS_ACK_POLICY: "explicit"
  NATS_ACK_WAIT: "300"
  NATS_RETENTION: "work_queue"
