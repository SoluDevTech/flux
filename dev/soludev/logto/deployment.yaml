apiVersion: apps/v1
kind: Deployment
metadata:
  name: logto
  namespace: soludev
  labels:
    app: logto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logto
  template:
    metadata:
      labels:
        app: logto
        app.kubernetes.io/part-of: soludev-workload
    spec:
      containers:
      - name: logto
        image: svhd/logto:1.41.0
        command:
        - sh
        - -c
        - |
          npm run cli db seed -- --swe
          npm run cli db alteration deploy v1.41.0
          exec npm start
        envFrom:
        - configMapRef:
            name: logto-config
        - secretRef:
            name: logto-secret
        ports:
        - containerPort: 3001
          protocol: TCP
        - containerPort: 3002
          protocol: TCP
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /api/status
            port: 3001
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
          timeoutSeconds: 1
        livenessProbe:
          httpGet:
            path: /api/status
            port: 3001
            scheme: HTTP
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/status
            port: 3001
            scheme: HTTP
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3