apiVersion: apps/v1
kind: Deployment
metadata:
  name: logto
  namespace: soludev
  labels:
    app: logto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logto
  template:
    metadata:
      labels:
        app: logto
    spec:
      containers:
        - name: logto
          image: svhd/logto:1.38.0
          command: 
            - "sh"
            - "-c"
            - |
              npm run cli db seed -- --swe
              npm run cli db alteration deploy v1.38.0
              exec npm start
          ports:
            - containerPort: 3002
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: logto-config
            - secretRef:
                name: logto-secret
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3001
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
