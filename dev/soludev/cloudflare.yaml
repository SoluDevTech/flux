apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: soludev
data:
  config.yml: |
    tunnel: 7b69fce6-d4ee-4cc4-a9c1-a644cb5096d3

    originRequest:
      noTLSVerify: true
      keepAliveTimeout: 30s
      connectTimeout: 30s
      tcpKeepAlive: 10s
      keepAliveConnections: 100

    ingress:
      - hostname: forgejo.soludev.tech
        service: http://traefik.kube-system.svc.cluster.local:80
      - hostname: dev.soludev.tech
        service: http://traefik.kube-system.svc.cluster.local:80
      - hostname: "*.dev.soludev.tech"
        service: http://traefik.kube-system.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-secret
  namespace: soludev
type: Opaque
stringData:
  TUNNEL_TOKEN: "eyJhIjoiZGI4YWNkYjZlZGI0YmFkOWY4N2ZjNDViMDgyNjI3MjEiLCJ0IjoiN2I2OWZjZTYtZDRlZS00Y2M0LWE5YzEtYTY0NGNiNTA5NmQzIiwicyI6Ik1qSmpNRGt6TlRFdE1UazNPQzAwTWpJM0xXRXhOMlF0TW1JNFltSTFOV1ptTXpWaiJ9"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: soludev
  labels:
    app: cloudflared
    app.kubernetes.io/part-of: soludev-workload
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/part-of: soludev-workload
    spec:
      dnsPolicy: ClusterFirst
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.5.0
        args:
        - tunnel
        - --no-autoupdate
        - --protocol
        - http2
        - --loglevel
        - info
        - --edge-ip-version
        - "4"
        - --retries
        - "5"
        - --config
        - /etc/cloudflared/config.yml
        - run
        - --token
        - $(TUNNEL_TOKEN)
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-secret
              key: TUNNEL_TOKEN
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config.yml
          subPath: config.yml
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /ready
            port: 20241
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 20241
          initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
      - name: config
        configMap:
          name: cloudflared-config
      restartPolicy: Always
