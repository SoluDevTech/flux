apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: soludev
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: soludev-workload
    spec:
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: dev-postgres-pvc
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["postgres", "-c", "checkpoint_timeout=15min", "-c", "max_wal_size=2GB", "-c", "checkpoint_completion_target=0.9"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: forgejo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: forgejo
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - forgejo
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - forgejo
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - forgejo
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
