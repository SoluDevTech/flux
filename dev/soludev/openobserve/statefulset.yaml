apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openobserve-openobserve-standalone
  namespace: soludev
  labels:
    app: openobserve
    app.kubernetes.io/name: openobserve-standalone
    app.kubernetes.io/part-of: soludev-workload
spec:
  serviceName: openobserve-openobserve-standalone-headless
  replicas: 1
  selector:
    matchLabels:
      app: openobserve
  template:
    metadata:
      labels:
        app: openobserve
        app.kubernetes.io/name: openobserve-standalone
        app.kubernetes.io/part-of: soludev-workload
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: openobserve
          image: o2cr.ai/openobserve/openobserve:v0.80.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5080
              protocol: TCP
            - name: grpc
              containerPort: 5081
              protocol: TCP
          env:
            - name: ZO_ROOT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: soludev-openobserve-secret
                  key: ZO_ROOT_USER_EMAIL
            - name: ZO_ROOT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soludev-openobserve-secret
                  key: ZO_ROOT_USER_PASSWORD
            - name: ZO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: soludev-openobserve-secret
                  key: MINIO_ACCESS
            - name: ZO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: soludev-openobserve-secret
                  key: MINIO_SECRET
            - name: ZO_META_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: soludev-openobserve-secret
                  key: ZO_META_POSTGRES_DSN
            - name: RUST_BACKTRACE
              value: "full"
            - name: ZO_META_STORE
              value: "postgres"
            - name: ZO_META_CONNECTION_POOL_MIN_SIZE
              value: "2"
            - name: ZO_META_CONNECTION_POOL_MAX_SIZE
              value: "20"
            - name: ZO_LOCAL_MODE
              value: "true"
            - name: ZO_LOCAL_MODE_STORAGE
              value: "s3"
            - name: ZO_S3_PROVIDER
              value: "minio"
            - name: ZO_S3_SERVER_URL
              value: "http://minio-soludev.soludev.svc.cluster.local:9000"
            - name: ZO_S3_REGION_NAME
              value: "us-east-1"
            - name: ZO_S3_BUCKET_NAME
              value: "observability"
            - name: ZO_S3_BUCKET_PREFIX
              value: ""
            - name: ZO_S3_FEATURE_FORCE_HOSTED_STYLE
              value: "false"
            - name: ZO_S3_FEATURE_FORCE_PATH_STYLE
              value: "true"
            - name: ZO_S3_FEATURE_HTTP1_ONLY
              value: "false"
            - name: ZO_S3_FEATURE_HTTP2_ONLY
              value: "false"
            - name: ZO_S3_CONNECT_TIMEOUT
              value: "30"
            - name: ZO_S3_REQUEST_TIMEOUT
              value: "3600"
            - name: ZO_COMPACT_DATA_RETENTION_DAYS
              value: "10"
            - name: ZO_COMPACT_ENABLED
              value: "true"
            - name: ZO_COMPACT_INTERVAL
              value: "3600"
            - name: ZO_FILE_PUSH_INTERVAL
              value: "10"
            - name: ZO_MAX_FILE_RETENTION_TIME
              value: "60"
            - name: ZO_MEM_PERSIST_INTERVAL
              value: "1"
            - name: ZO_MEMORY_CACHE_ENABLED
              value: "true"
            - name: ZO_MEMORY_CACHE_MAX_SIZE
              value: "512"
            - name: ZO_DISK_CACHE_ENABLED
              value: "true"
            - name: ZO_DISK_CACHE_MAX_SIZE
              value: "2000"
            - name: ZO_DISK_CACHE_GC_INTERVAL
              value: "30"
            - name: ZO_DISK_CACHE_GC_SIZE
              value: "500"
            - name: ZO_DISK_CACHE_STRATEGY
              value: "time_lru"
            - name: ZO_RESULT_CACHE_ENABLED
              value: "true"
            - name: ZO_MAX_DASHBOARD_SERIES
              value: "500"
            - name: ZO_DATA_DIR
              value: "/data"
            - name: ZO_DATA_WAL_DIR
              value: "/data-wal"
            - name: ZO_DATA_CACHE_DIR
              value: "/data-cache"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: wal
              mountPath: /data-wal
            - name: cache
              mountPath: /data-cache
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz
              port: 5080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: data
          emptyDir: {}
        - name: wal
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 2Gi