apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-soludev-minio
  namespace: soludev
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-soludev-minio
  nfs:
    server: 37.60.225.137
    path: /srv/nfs/soludev/minio
  mountOptions:
    - nfsvers=3
    - soft
    - timeo=100
    - retrans=3
    - actimeo=10
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
