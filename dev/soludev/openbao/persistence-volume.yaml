apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-soludev-openbao
  namespace: soludev
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-soludev-openbao
  nfs:
    server: 100.64.0.3
    path: /Volumes/NFSStorage/soludev/openbao
  mountOptions:
    - nfsvers=3
    - soft
    - timeo=300
    - retrans=10
    - actimeo=60
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime