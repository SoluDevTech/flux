apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: soludev
  labels:
    app: valkey
    app.kubernetes.io/part-of: soludev-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
        app.kubernetes.io/part-of: soludev-workload
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          args:
            - valkey-server
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
          ports:
            - name: valkey
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"