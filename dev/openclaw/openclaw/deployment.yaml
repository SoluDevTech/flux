apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false

      initContainers:
        - name: init-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/config/openclaw.json ]; then
                cat > /data/config/openclaw.json << EOF
              {
                "gateway": {
                  "mode": "local",
                  "bind": "lan",
                  "controlUi": { "enabled": true, "dangerouslyDisableDeviceAuth": true },
                  "trustedProxies": ["10.42.0.0/16"],
                  "auth": {
                    "mode": "token",
                    "token": "${GATEWAY_TOKEN}"
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "anthropic/claude-opus-4-5"
                    },
                    "workspace": "/home/node/workspace"
                  }
                },
                "channels": {
                  "telegram": {
                    "enabled": true,
                    "allowFrom": ["1988394825","8607935693"]
                  }
                }
              }
              EOF
              fi
              if [ ! -f /data/workspace/SOUL.md ]; then
                cp /init-soul/SOUL.md /data/workspace/SOUL.md
              fi
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GATEWAY_TOKEN
          volumeMounts:
            - name: data
              mountPath: /data
            - name: init-soul
              mountPath: /init-soul

      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.8
          imagePullPolicy: Always

          command: ["node", "dist/index.js", "gateway", "--port", "18789", "--bind", "lan"]

          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790

          env:
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: BRAVE_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: ANTHROPIC_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GATEWAY_TOKEN
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
            - name: OPENCLAW_WORKSPACE_DIR
              value: "/home/node/workspace"
            - name: XDG_DATA_HOME
              value: "/tmp/opencode-data"

          volumeMounts:
            - name: data
              mountPath: /home/node
              subPath: home
            - name: data
              mountPath: /home/node/.openclaw
              subPath: config
            - name: data
              mountPath: /home/node/workspace
              subPath: workspace

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 90
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 90
            periodSeconds: 30

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: init-soul
          configMap:
            name: openclaw-config
            items:
              - key: SOUL.md
                path: SOUL.md