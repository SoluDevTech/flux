apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-openclaw
  namespace: openclaw
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 100.64.0.3
    path: /Volumes/NFSStorage/openclaw
  mountOptions:
    - nfsvers=3
    - hard
    - timeo=600
    - retrans=2