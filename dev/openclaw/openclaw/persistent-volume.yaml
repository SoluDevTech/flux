apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-openclaw
  namespace: openclaw
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 37.60.225.137
    path: /srv/nfs/openclaw
  mountOptions:
    - nfsvers=3
    - soft
    - timeo=100
    - retrans=3
    - actimeo=10
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
