apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubby-back
  namespace: ubby
  labels:
    app: ubby-back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubby-back
  template:
    metadata:
      labels:
        app: ubby-back
        app.kubernetes.io/part-of: soludev-workload
    spec:
      containers:
        - name: ubby-back
          image: kaiohz/pickpro:ubby-back-a1c0d2817f34ccc1d875b14c178dd8e297996ab0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ubby-back-config
            - secretRef:
                name: ubby-back-secret
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
      imagePullSecrets:
        - name: ubby-docker-secret
