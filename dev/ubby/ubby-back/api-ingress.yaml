apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ubby-back-api-ingress
  namespace: ubby
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: ubby-back-api.soludev.tech
      http:
        paths:
          - path: /api/v1/mcp/details
            pathType: Prefix
            backend:
              service:
                name: ubby-back
                port:
                  number: 8000