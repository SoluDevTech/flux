postgresql:
  enabled: false

database:
  postgres:
    host: "postgres"
    port: 5432
    db: "phoenix"
    user: "phoenix"
    password: ""
  defaultRetentionPolicyDays: 10

auth:
  enableAuth: true
  createSecret: false                   # Do NOT let the chart create/overwrite the secret
  name: "soludev-phoenix-secret"        # Use the pre-existing OpenBao-managed K8s secret
  secret:
    - key: "PHOENIX_SECRET"
      value: ""
    - key: "PHOENIX_ADMIN_SECRET"
      value: ""
    - key: "PHOENIX_POSTGRES_PASSWORD"
      value: ""
    - key: "PHOENIX_SMTP_PASSWORD"
      value: ""
    - key: "PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD"
      value: ""

persistence:
  enabled: false

ingress:
  enabled: false

server:
  port: 6006

# Probes (chart 9.x: déplacées sous healthChecks)
healthChecks:
  startupProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 10
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

service:
  type: "ClusterIP"
