server:
  # Utiliser le service account avec permissions TokenReview
  serviceAccount:
    create: false
    name: openbao
  # Resource limits to prevent OOM kills
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  tolerations:
    - key: klipperlb-exclude
      value: "true"
      effect: NoSchedule
      operator: Equal
  # Avoid recursive chown on NFS volumes (263k+ files)
  securityContext:
    fsGroupChangePolicy: "OnRootMismatch"
  # Configuration du stockage NFS
  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: nfs-soludev-openbao
    accessMode: ReadWriteMany