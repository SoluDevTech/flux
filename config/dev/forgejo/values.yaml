# Forgejo Helm chart values for dev cluster
# Chart: oci://code.forgejo.org/forgejo-helm/forgejo
# Version: 17.1.0

# External PostgreSQL in soludev namespace (see dev/soludev/postgres.yaml)

# Image configuration
image:
  fullOverride: codeberg.org/forgejo/forgejo:15.0.2-rootless
  pullPolicy: IfNotPresent

# Single replica for dev
replicaCount: 1

# Service configuration
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22

# Persistence
persistence:
  enabled: true
  create: true
  mount: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# Forgejo / Gitea configuration (maps to app.ini)
gitea:
  config:
    APP_NAME: 'SoluDevTech Forgejo'
    RUN_MODE: prod

    server:
      DOMAIN: forgejo.soludev.tech
      ROOT_URL: https://forgejo.soludev.tech
      PROTOCOL: http
      SSH_DOMAIN: forgejo.soludev.tech
      SSH_PORT: 22
      SSH_LISTEN_PORT: 2222
      REDIRECT_OTHER_PORT: false

    database:
      DB_TYPE: postgres
      HOST: postgres.soludev.svc.cluster.local:5432
      NAME: forgejo
      USER: forgejo
      # PASSWD injected via deployment.env from postgres-secret (no secrets in Git)
      SSL_MODE: disable

    security:
      SECRET_KEY: change-me-in-production-use-random-string
      INSTALL_LOCK: true

    service:
      DISABLE_REGISTRATION: false
      REQUIRE_SIGNIN_VIEW: false

    session:
      PROVIDER: memory

    cache:
      ADAPTER: memory

    mailer:
      ENABLED: false

  admin:
    username: forgejo_admin
    email: admin@soludev.tech
    passwordMode: initialOnlyNoReset

  oauth: []

# Inject database password from existing Kubernetes secret (no secrets in Git)
deployment:
  env:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: postgres-secret
          key: password

# Resource limits (dev cluster is small)
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
