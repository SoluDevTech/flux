config:
  existingSecret: "oauth2-proxy-secret"
  existingConfig: "oauth2-proxy-config"
  cookieName: "oauth2-proxy-pickpro"

alphaConfig:
  enabled: true
  existingConfig: "oauth2-proxy-alpha-config"

sessionStorage:
  type: cookie

ingress:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "128Mi"

service:
  type: ClusterIP
  portNumber: 4180