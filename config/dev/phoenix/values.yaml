postgresql:
  enabled: false

database:
  postgres:
    host: "postgres"
    port: 5432
    db: "phoenix"
    user: "phoenix"
    password: ""  # Password comes from external secret via additionalEnv
  defaultRetentionPolicyDays: 10  # Automatically delete traces older than 10 days

auth:
  enableAuth: true

# Secrets are injected via auth.secret by the install script (no additionalEnv needed in chart 5.x)

persistence:
  enabled: false

ingress:
  enabled: false

server:
  port: 6006