postgresql:
  enabled: false

database:
  postgres:
    host: "postgres"
    port: 5432
    db: "phoenix"
    user: "phoenix"
    password: ""  # Password comes from external secret via additionalEnv
  defaultRetentionPolicyDays: 10  # Automatically delete traces older than 10 days

auth:
  enableAuth: true
  createSecret: false                   # Do NOT let the chart create/overwrite the secret
  name: "soludev-phoenix-secret"        # Use the pre-existing OpenBao-managed K8s secret
  secret:
    - key: "PHOENIX_SECRET"
    - key: "PHOENIX_ADMIN_SECRET"
    - key: "PHOENIX_POSTGRES_PASSWORD"
    - key: "PHOENIX_SMTP_PASSWORD"
    - key: "PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD"

persistence:
  enabled: false

ingress:
  enabled: false

server:
  port: 6006